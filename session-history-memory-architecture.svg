<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="sessionGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="archivistGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="dreamGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="retrievalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="arrCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)" rx="8"/>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fff" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.03"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700" letter-spacing="1">会话历史与记忆系统架构</text>
  <text x="600" y="58" text-anchor="middle" fill="#64748b" font-size="13">Claude Code Session History &amp; Memory Architecture</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TOP ROW: User ↔ Agent -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- User -->
  <rect x="60" y="95" width="150" height="52" rx="26" fill="url(#userGrad)" filter="url(#shadow)"/>
  <text x="135" y="125" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">👤 用户</text>

  <!-- Bidirectional arrows -->
  <line x1="210" y1="108" x2="280" y2="108" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrBlue)"/>
  <line x1="280" y1="134" x2="210" y2="134" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrBlue)"/>
  <text x="245" y="100" text-anchor="middle" fill="#60a5fa" font-size="10">对话</text>
  <text x="245" y="150" text-anchor="middle" fill="#60a5fa" font-size="10">响应</text>

  <!-- Agent -->
  <rect x="290" y="85" width="200" height="72" rx="12" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="390" y="113" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="500">CLAUDE CODE</text>
  <text x="390" y="132" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">主代理</text>
  <text x="390" y="148" text-anchor="middle" fill="#93c5fd" font-size="10">Main Agent</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- MIDDLE ROW: Session History | Archivist/Dream | Memory -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- ── LEFT COLUMN: Session History ── -->

  <rect x="60" y="200" width="220" height="32" rx="6" fill="url(#sessionGrad)" opacity="0.15"/>
  <text x="170" y="221" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="600">📝 会话历史 Session History</text>

  <rect x="60" y="245" width="220" height="180" rx="10" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="170" y="270" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600">JSONL 文件存储</text>
  <rect x="80" y="285" width="180" height="22" rx="4" fill="#334155"/>
  <text x="170" y="300" text-anchor="middle" fill="#e2e8f0" font-size="11">a1b2c3d4.jsonl — 会话 1</text>
  <rect x="80" y="313" width="180" height="22" rx="4" fill="#334155"/>
  <text x="170" y="328" text-anchor="middle" fill="#e2e8f0" font-size="11">e5f6g7h8.jsonl — 会话 2</text>
  <rect x="80" y="341" width="180" height="22" rx="4" fill="#334155"/>
  <text x="170" y="356" text-anchor="middle" fill="#64748b" font-size="11">······</text>
  <rect x="80" y="369" width="180" height="22" rx="4" fill="#334155"/>
  <text x="170" y="384" text-anchor="middle" fill="#e2e8f0" font-size="11">x9y8z7w6.jsonl — 会话 N</text>

  <!-- Session History arrows from agent -->
  <path d="M 395 157 L 395 190 L 170 190 L 170 238" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrGray)" opacity="0.6"/>
  <text x="280" y="185" fill="#7c3aed" font-size="9" opacity="0.6">写入会话记录</text>

  <!-- Session History commands -->
  <rect x="60" y="440" width="220" height="30" rx="6" fill="#4c1d95" filter="url(#shadow)"/>
  <text x="170" y="459" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">/insights  /cost  /resume</text>

  <!-- ── RIGHT COLUMN: Memory ── -->

  <rect x="860" y="200" width="290" height="32" rx="6" fill="url(#memoryGrad)" opacity="0.15"/>
  <text x="1005" y="221" text-anchor="middle" fill="#10b981" font-size="13" font-weight="600">🧠 记忆 Memory</text>

  <rect x="860" y="245" width="290" height="230" rx="10" fill="#1e293b" stroke="#059669" stroke-width="1.5" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="1005" y="270" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">Memory 目录结构</text>
  <rect x="880" y="285" width="250" height="22" rx="4" fill="#064e3b"/>
  <text x="1005" y="300" text-anchor="middle" fill="#e2e8f0" font-size="11">📄 MEMORY.md (索引)</text>
  <rect x="880" y="313" width="250" height="22" rx="4" fill="#334155"/>
  <text x="1005" y="328" text-anchor="middle" fill="#e2e8f0" font-size="11">📄 user_role.md</text>
  <rect x="880" y="341" width="250" height="22" rx="4" fill="#334155"/>
  <text x="1005" y="356" text-anchor="middle" fill="#e2e8f0" font-size="11">📄 project_goals.md</text>
  <rect x="880" y="369" width="250" height="22" rx="4" fill="#334155"/>
  <text x="1005" y="384" text-anchor="middle" fill="#94a3b8" font-size="11">📂 team/</text>

  <!-- ── CENTER COLUMN: Memory Generation (Archivist + Dream) ── -->

  <!-- Path 1: Direct Write (Agent → Memory) -->
  <path d="M 490 110 L 1005 110 L 1005 238" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#arrGreen)"/>
  <rect x="430" y="96" width="220" height="22" rx="4" fill="#065f46" opacity="0.9" filter="url(#shadow)"/>
  <text x="540" y="111" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">✅ 主代理直接写入 (Write/Edit)</text>

  <!-- "或" divider -->
  <rect x="550" y="126" width="50" height="18" rx="9" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="575" y="138" text-anchor="middle" fill="#94a3b8" font-size="10">或</text>

  <!-- Path 2: Archivist (Agent ↓ Archivist) -->
  <path d="M 390 157 L 390 195 L 575 195 L 575 228" stroke="#fbbf24" stroke-width="2.5" fill="none" marker-end="url(#arrOrange)"/>

  <!-- Archivist -->
  <rect x="430" y="233" width="300" height="120" rx="12" fill="#1e293b" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.6" filter="url(#shadow)"/>
  <rect x="450" y="245" width="260" height="28" rx="6" fill="url(#archivistGrad)" opacity="0.2"/>
  <text x="580" y="264" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">🔍 Archivist</text>
  <text x="580" y="286" text-anchor="middle" fill="#94a3b8" font-size="10">后台提取代理</text>
  <text x="455" y="308" fill="#e2e8f0" font-size="10">• 每轮对话后自动 fork</text>
  <text x="455" y="324" fill="#e2e8f0" font-size="10">• 增量提取（仅新增消息）</text>
  <text x="455" y="340" fill="#e2e8f0" font-size="10">• 权限隔离（仅 memory 目录可写）</text>

  <!-- Archivist → Memory -->
  <path d="M 730 293 L 852 293" stroke="#fbbf24" stroke-width="2.5" fill="none" marker-end="url(#arrOrange)"/>

  <!-- Dream -->
  <rect x="430" y="380" width="300" height="115" rx="12" fill="#1e293b" stroke="#dc2626" stroke-width="1.5" stroke-opacity="0.6" filter="url(#shadow)"/>
  <rect x="450" y="392" width="260" height="28" rx="6" fill="url(#dreamGrad)" opacity="0.2"/>
  <text x="580" y="411" text-anchor="middle" fill="#f87171" font-size="13" font-weight="600">💭 Dream</text>
  <text x="580" y="433" text-anchor="middle" fill="#94a3b8" font-size="10">定期整理服务</text>
  <text x="455" y="455" fill="#e2e8f0" font-size="10">• 触发：≥24h + ≥5 新会话</text>
  <text x="455" y="471" fill="#e2e8f0" font-size="10">• 4 阶段：Orient→Gather→Consolidate→Prune</text>
  <text x="455" y="487" fill="#e2e8f0" font-size="10">• 合并去重、修剪过期、更新索引</text>

  <!-- Memory → Dream (Dream reads from Memory) -->
  <path d="M 855 425 L 738 425" stroke="#f87171" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="795" y="418" text-anchor="middle" fill="#f87171" font-size="9">读取</text>

  <!-- Dream → Memory (Dream writes back) -->
  <path d="M 730 455 L 852 455" stroke="#f87171" stroke-width="2.5" fill="none" marker-end="url(#arrRed)"/>
  <text x="790" y="468" text-anchor="middle" fill="#f87171" font-size="9">写入</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BOTTOM SECTION: New Session Retrieval -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="60" y="530" width="1080" height="165" rx="12" fill="#1e293b" stroke="#0891b2" stroke-width="1" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="600" y="560" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="600">🔄 新会话启动 — 记忆检索</text>

  <!-- Memory → Retrieval paths -->
  <path d="M 1005 473 L 1005 500 L 300 500 L 300 600" stroke="#34d399" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrGreen)" opacity="0.6"/>
  <path d="M 1005 473 L 1005 600" stroke="#34d399" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrGreen)" opacity="0.6"/>

  <!-- Retrieval Path 1: MEMORY.md auto-load -->
  <rect x="100" y="595" width="400" height="45" rx="8" fill="#155e75" filter="url(#shadow)"/>
  <text x="140" y="615" fill="#22d3ee" font-size="20">📄</text>
  <text x="175" y="613" fill="#fff" font-size="13" font-weight="600">MEMORY.md 自动加载</text>
  <text x="175" y="631" fill="#7dd3fc" font-size="10">作为 system prompt 注入（≤200行/25KB）</text>

  <!-- Retrieval Path 2: findRelevantMemories -->
  <rect x="700" y="595" width="400" height="45" rx="8" fill="#155e75" filter="url(#shadow)"/>
  <text x="740" y="615" fill="#22d3ee" font-size="20">🔎</text>
  <text x="775" y="613" fill="#fff" font-size="13" font-weight="600">findRelevantMemories()</text>
  <text x="775" y="631" fill="#7dd3fc" font-size="10">Sonnet 打分 → 最多 5 条 Attachment 注入</text>

  <!-- Merge to output -->
  <path d="M 500 617 L 650 617" stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 700 617 L 650 617" stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 650 617 L 650 654" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrCyan)" opacity="0.5"/>

  <!-- Output -->
  <rect x="230" y="660" width="680" height="28" rx="6" fill="url(#retrievalGrad)" opacity="0.15" filter="url(#shadow)"/>
  <text x="570" y="679" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="600">代理基于历史知识与记忆继续工作</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BOTTOM TABLE: Session History vs Memory -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="60" y="725" width="1080" height="155" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="600" y="750" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600">会话历史 vs 记忆 —— 关键区别</text>

  <!-- Table headers -->
  <rect x="80" y="758" width="310" height="28" rx="4" fill="#7c3aed" opacity="0.3"/>
  <text x="235" y="777" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">会话历史 (Session History)</text>

  <rect x="400" y="758" width="310" height="28" rx="4" fill="#059669" opacity="0.3"/>
  <text x="555" y="777" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">记忆 (Memory)</text>

  <!-- Table rows -->
  <rect x="80" y="792" width="310" height="26" rx="3" fill="#1e293b"/>
  <rect x="400" y="792" width="310" height="26" rx="3" fill="#1e293b"/>
  <rect x="720" y="758" width="410" height="60" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <text x="235" y="809" text-anchor="middle" fill="#e2e8f0" font-size="11">会话维度 (Session)</text>
  <text x="555" y="809" text-anchor="middle" fill="#e2e8f0" font-size="11">项目维度 (Project)</text>

  <rect x="80" y="824" width="310" height="26" rx="3" fill="#1e293b"/>
  <rect x="400" y="824" width="310" height="26" rx="3" fill="#1e293b"/>
  <rect x="720" y="824" width="410" height="26" rx="3" fill="#1e293b"/>

  <text x="235" y="841" text-anchor="middle" fill="#e2e8f0" font-size="11">JSONL（完整对话记录）</text>
  <text x="555" y="841" text-anchor="middle" fill="#e2e8f0" font-size="11">Markdown（提炼摘要）</text>

  <text x="740" y="777" fill="#94a3b8" font-size="11">说明</text>
  <text x="740" y="797" fill="#cbd5e1" font-size="11">会话历史太大，无法直接注入上下文；</text>
  <text x="740" y="813" fill="#cbd5e1" font-size="11">记忆通过 MEMORY.md 自动加载 + 按需检索注入</text>
</svg>
