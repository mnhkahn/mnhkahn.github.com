name: Watch Workflow Status
on:
  # 完全保留你原有的触发逻辑：Pages构建部署完成后触发
  workflow_run:
    workflows: [ "pages-build-deployment" ]
    types: [ completed ]
env:
  # 飞书机器人Webhook，需在仓库Secrets中配置 LARK_BOT_WEBHOOK
  LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
  # 若机器人开启了签名校验，需配置此项，无签名可直接删除
  LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # 完全复用你原有的环境信息提取步骤，所有变量100%兼容，无需修改
      - id: prep
        uses: hocgin/action-env@main

      # 飞书通知步骤，替换原企业微信通知
      - name: Feishu(Lark) Notification
        uses: actions-cool/feishu-notice@v3
        with:
          webhook: ${{ env.LARK_BOT_WEBHOOK }}
          secret: ${{ env.LARK_BOT_SECRET }} # 无签名校验可删除此行
          msgtype: markdown
          # 适配飞书Markdown语法，保留所有原有信息，优化Pages场景文案
          content: |
            **【[${{ steps.prep.outputs.repo_full_name }}](${{ steps.prep.outputs.repo_html_url }})】**
            ${{ github.event.workflow_run.conclusion == 'success' && '☀️ GitHub Pages 构建部署成功' || '🌧️ GitHub Pages 构建部署失败' }}
            🏃 触发人：[@${{ steps.prep.outputs.sender }}](${{ steps.prep.outputs.sender_html_url }})
            🕐 触发时间：<span style="color:grey;">${{ steps.prep.outputs.action_trigger_at }}</span>
            🔧 分支信息：<span style="color:orange;">${{ steps.prep.outputs.source_branch || '∅' }} -> ${{ steps.prep.outputs.target_branch || '∅' }}</span>
            🏆 版本信息：<span style="color:grey;">${{ steps.prep.outputs.env || '未知版本' }} / ${{ steps.prep.outputs.version || '未知版本' }}</span>
            📝 提交信息：${{ steps.prep.outputs.commit_body }}

            [查看仓库详情](${{ steps.prep.outputs.repo_homepage || steps.prep.outputs.repo_html_url }})
