<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mainAgent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67e8f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="forkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="taskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Decorative background circles -->
  <circle cx="200" cy="150" r="180" fill="#6366f1" opacity="0.04"/>
  <circle cx="1000" cy="480" r="150" fill="#22d3ee" opacity="0.04"/>
  <circle cx="600" cy="315" r="250" fill="#a855f7" opacity="0.03"/>

  <!-- Title -->
  <text x="600" y="65" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" letter-spacing="1">Claude Code 的 Subagent 机制</text>
  <text x="600" y="105" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" letter-spacing="0.5">触发条件 · 类型对比 · 结果回流</text>

  <!-- Central connection lines (behind nodes) -->
  <!-- Main → Sub bottom -->
  <path d="M580,195 C560,260 600,260 210,310" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <path d="M580,195 C560,260 600,260 990,310" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <!-- Main → Fork -->
  <path d="M580,195 C560,240 520,245 370,440" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <path d="M580,195 C560,240 680,245 830,440" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Fork → Task -->
  <path d="M290,490 C290,520 320,540 360,540" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <path d="M490,490 C490,520 460,540 440,540" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Main Agent Node (center) -->
  <g filter="url(#shadow)">
    <rect x="520" y="140" width="160" height="60" rx="30" fill="url(#mainAgent)" filter="url(#glow)"/>
    <text x="600" y="177" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600">主Agent</text>
  </g>

  <!-- Label: Session -->
  <text x="600" y="130" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12">Session</text>

  <!-- Subagent nodes (middle row) -->
  <g filter="url(#shadow)">
    <rect x="115" y="280" width="190" height="55" rx="12" fill="url(#subGrad)"/>
    <text x="130" y="307" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">普通子Agent</text>
    <text x="130" y="325" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="10" opacity="0.7">独立任务 · 新上下文</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="895" y="280" width="190" height="55" rx="12" fill="url(#forkGrad)"/>
    <text x="910" y="307" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Fork子Agent</text>
    <text x="910" y="325" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="10" opacity="0.7">继承上下文 · 并行验证</text>
  </g>

  <!-- Type labels -->
  <rect x="115" y="340" width="190" height="22" rx="4" fill="#64748b" opacity="0.15"/>
  <text x="210" y="355" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">subagent_type = general-purpose/Explore/Plan</text>

  <rect x="895" y="340" width="190" height="22" rx="4" fill="#64748b" opacity="0.15"/>
  <text x="990" y="355" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">agentType = fork（固定）</text>

  <!-- Subagent detail rows (bottom row) -->
  <g filter="url(#shadow)">
    <rect x="145" y="410" width="130" height="40" rx="8" fill="#334155"/>
    <text x="155" y="430" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">agentType</text>
    <text x="155" y="444" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">内置 / Markdown / JSON</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="665" y="410" width="130" height="40" rx="8" fill="#334155"/>
    <text x="675" y="430" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">agentType</text>
    <text x="675" y="444" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">synthetic 类型</text>
  </g>

  <!-- Task row -->
  <g filter="url(#shadow)">
    <rect x="345" y="520" width="210" height="45" rx="10" fill="url(#taskGrad)"/>
    <text x="450" y="547" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">local_agent Task</text>
  </g>

  <!-- Result flow arrows -->
  <!-- Subagent → output -->
  <path d="M305,310 L760,310" stroke="#22d3ee" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.4" marker-end="url(#arrowCyan)"/>
  <text x="530" y="302" text-anchor="middle" fill="#22d3ee" font-family="system-ui, -apple-system, sans-serif" font-size="9" opacity="0.6">tool_result / task-notification</text>

  <!-- Bottom labels -->
  <text x="450" y="585" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">后台任务管理 · /tasks 面板 · 进度追踪</text>

  <!-- Result type legend -->
  <rect x="110" y="490" width="380" height="24" rx="4" fill="#1e293b" opacity="0.0"/>
  <rect x="110" y="490" width="12" height="12" rx="3" fill="#22d3ee"/>
  <text x="128" y="500" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">同步：tool_result（阻塞主Agent）</text>
  <rect x="280" y="490" width="12" height="12" rx="3" fill="#f59e0b"/>
  <text x="298" y="500" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">异步：task-notification（不阻塞）</text>

  <!-- Decorative dots -->
  <circle cx="80" cy="580" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="1120" cy="80" r="2" fill="#22d3ee" opacity="0.3"/>
  <circle cx="1050" cy="120" r="3" fill="#a855f7" opacity="0.2"/>

  <!-- Tag line -->
  <rect x="410" y="595" width="380" height="24" rx="12" fill="#1e293b" opacity="0.6"/>
  <text x="600" y="611" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">主Agent是中枢 — 子Agent之间不直接通信</text>

</svg>