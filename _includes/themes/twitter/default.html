<!doctype html>
<html lang="en" xmlns:wb="http://open.weibo.com/wb">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- 标准 Bootstrap 5 viewport -->
        <title>{{ page.title }}</title>
        {% if page.description %}
        <meta name="description" content="{{ page.description }}" />
        {% else %}
        <meta name="description" content="大家好我是Bryce，从事后端工作10年了。关注Go语言开发，这里有后端开发常见工具、开发常见问题和解决思路，希望能帮助到大家。" />
        {% endif %}
        <meta name="author" content="{{ site.author.name }}" />
        <meta name="google-translate-customization" content="a4136e955b3e09f2-45a74b56dc13e741-gf616ffda6e6360e0-11" />

        <!-- Bootstrap 5 CSS -->
        <link href="https://cdn.staticdelivr.com/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <script src="https://kit.fontawesome.com/fd82d40e9b.js" crossorigin="anonymous"></script>
        <!-- 自定义样式 -->
        <link href="{{ ASSET_PATH }}/css/style.css?body=1" rel="stylesheet" type="text/css" media="all" />

        <!-- Le fav and touch icons -->
        <link rel="shortcut icon" href="/assets/images/c32.ico" />

        <!-- atom & rss feed -->
        <link href="{{ BASE_PATH }}{{ site.JB.atom_path }}" type="application/atom+xml" rel="alternate" title="Sitewide ATOM Feed" />
        <link href="{{ BASE_PATH }}{{ site.JB.rss_path }}" type="application/rss+xml" rel="alternate" title="Sitewide RSS Feed" />

        <!-- DocSearch -->
        <link rel="stylesheet" href="https://cdn.staticdelivr.com/npm/@docsearch/css@3" />
    </head>

    <body>
        <header class="p-1 text-bg-dark">
            <div class="container">
                <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                    <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none me-md-auto d-none d-lg-block">
                        <img src="https://res.cloudinary.com/cyeam/image/upload/v1537933515/cyeam/bryce.jpg" id="site-logo" style="width: 50px" alt="Cyeam Logo" />
                    </a>
                    <ul class="nav col-12 col-lg-auto mb-2 justify-content-center mb-md-0">
                        <li class="d-block d-lg-none">
                            <a href="/" class="nav-link px-2 text-white"><b>HOME</b></a>
                        </li>
                        <li>
                            <a href="//www.cyeam.com/tool/jsonpack" class="nav-link px-2 text-white"><b>开发工具</b></a>
                        </li>
                        <li>
                            <a href="//geek.cyeam.com/geek" class="nav-link px-2 text-white"><b>头条</b></a>
                        </li>
                        <li>
                            <a href="//www.cyeam.com/pin" class="nav-link px-2 text-white"><b>随记</b></a>
                        </li>
                        <li>
                            <a href="https://blog.cyeam.com/tags.html#AI-ref" class="nav-link px-2 text-white"><b>AI学习</b></a>
                        </li>
                    </ul>
                    <div id="docsearch"></div>
                    <script src="https://res.cloudinary.com/cyeam/raw/upload/v1749050388/static/docsearch3.js"></script>
                    <link rel="stylesheet" href="https://res.cloudinary.com/cyeam/raw/upload/v1749050387/static/docsearch3.css" />
                    <script type="text/javascript">
                        docsearch({
                            appId: "R0OU0JZTBA",
                            apiKey: "745219c0c5e3e85de57e401368c82466",
                            indexName: "man_cyeam_pages",
                            container: "#docsearch",
                            placeholder: "Golang优化之路",
                            debug: true,
                        });
                    </script>
                    <div id="translate"></div>
                    <!-- 引入多语言切换的js -->
                    <script src="https://www.cyeam.com/js/translate.js"></script>
                    <script>
                        document.addEventListener("DOMContentLoaded", function () {
                            translate.selectLanguageTag.show = true; //不出现的select的选择语言
                            translate.selectLanguageTag.languages = "chinese_simplified,english,japanese,korean,french,deutsch,chinese_traditional";
                            translate.service.use("client.edge"); //设置机器翻译服务通道
                            translate.setAutoDiscriminateLocalLanguage();
                            translate.execute();
                            document.getElementById("translateSelectLanguage").classList.add("form-select");
                        });
                    </script>
                </div>
            </div>
        </header>

        <div id="container" class="container-narrow opacity">
            <div class="content" id="content">{{ content }}</div>

            <footer class="d-flex flex-wrap justify-content-center align-items-center">
                <div class="col-12 col-md-7 mb-0 text-body-secondary text-center text-md-start">
                    <p class="copyright small mb-0">&copy; {{ site.time | date: '%Y' }} {{ site.author.name }} with help from GitHub {% include custom/analytics %}</p>
                </div>
                <div class="nav col-12 col-md-5 justify-content-center justify-content-lg-end">
                    <ul class="nav justify-content-end">
                        <li class="nav-item">
                            <a href="//www.cyeam.com/calendar" class="nav-link px-2 text-body-secondary"><b>日历</b></a>
                        </li>
                        <li class="nav-item">
                            <a href="//www.cyeam.com/about" class="nav-link px-2 text-body-secondary"><b>关于我</b></a>
                        </li>
                        <li class="nav-item">
                            <a href="//www.cyeam.com/mcp/quickstart" class="nav-link px-2 text-body-secondary"><b>MCP</b></a>
                        </li>
                        <li class="nav-item">
                            <a href="https://blog.cyeam.com/" class="nav-link px-2 text-body-secondary"><b>博客</b></a>
                        </li>
                        <li class="nav-item">
                            <a href="https://blog.cyeam.com/ai/2026/03/14/medicine" class="nav-link px-2 text-body-secondary"><b>药不能停</b></a>
                        </li>
                    </ul>
                </div>
            </footer>
        </div>

        <!-- Scripts -->

        <!-- 保留 jQuery (以防 cyeam.js 依赖) -->
        <script src="https://libs.baidu.com/jquery/1.7.2/jquery.min.js"></script>
        <script>
            !window.jQuery && document.write('<script src="/assets/js/jquery-1.7.2.min.js"><\/script>');
        </script>
        <script type="text/javascript" src="/assets/js/cyeam.js"></script>

        <!-- Bootstrap 5 JS Bundle (含 Popper) -->
        <script src="https://cdn.staticdelivr.com/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- 1. 引入 Prism.css（放在这里或 <head> 都可以） -->
        <link href="https://cdn.staticdelivr.com/npm/prismjs@1.29.0/themes/prism.css" rel="stylesheet" />
        <script src="https://cdn.staticdelivr.com/npm/prismjs@1.29.0/prism.min.js"></script>
        <script src="https://cdn.staticdelivr.com/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

        <!-- Mermaid -->
        <script src="https://cdn.staticdelivr.com/npm/mermaid@11.12.2/dist/mermaid.min.js"></script>
        <script src="https://www.cyeam.com/js/util.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                mermaid.initialize({
                    startOnLoad: true,
                    theme: "forest",
                    securityLevel: "loose",
                });
                const preview = document.getElementById("content");
                const mermaidInitializer = new MermaidInitializer(preview);
            });
        </script>

        <!-- Google Adsense -->
        <script async src="//pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({
                google_ad_client: "ca-pub-1651120361108148",
                enable_page_level_ads: true,
            });
        </script>
    </body>
</html>
